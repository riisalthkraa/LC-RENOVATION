<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Logo LC Rénovation Animé</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* ===== RESET & PAGE ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Barlow', sans-serif;
    }

    /* ===== CONTENEUR LOGO ===== */
    .lc-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      width: 340px;
    }

    /* ===== ICÔNE TOITS SVG ===== */
    .lc-icon {
      width: 220px;
      margin-bottom: 8px;
      overflow: visible;
    }

    /* Toit gauche petit */
    .roof-left {
      animation: roofSlideLeft 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    /* Toit droit grand */
    .roof-right {
      animation: roofSlideRight 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.15s both;
    }
    /* Ligne décorative ondulée */
    .roof-wave {
      animation: waveReveal 0.9s ease 0.5s both;
    }

    @keyframes roofSlideLeft {
      from { opacity: 0; transform: translateX(-30px) translateY(-20px); }
      to   { opacity: 1; transform: translateX(0) translateY(0); }
    }
    @keyframes roofSlideRight {
      from { opacity: 0; transform: translateX(30px) translateY(-20px); }
      to   { opacity: 1; transform: translateX(0) translateY(0); }
    }
    @keyframes waveReveal {
      from { opacity: 0; stroke-dashoffset: 300; }
      to   { opacity: 1; stroke-dashoffset: 0; }
    }

    /* ===== TEXTE PRINCIPAL ===== */
    .lc-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: 0.02em;
      line-height: 1;
      animation: titleReveal 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.7s both;
    }
    .lc-title .lc {
      color: #b91c1c;
    }
    .lc-title .reno {
      color: #1a1a1a;
    }

    @keyframes titleReveal {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== SOUS-TITRE ===== */
    .lc-subtitle {
      font-family: 'Barlow', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      color: #b91c1c;
      text-transform: uppercase;
      margin-top: 4px;
      animation: subtitleReveal 0.6s ease 1s both;
    }

    @keyframes subtitleReveal {
      from { opacity: 0; letter-spacing: 0.4em; }
      to   { opacity: 1; letter-spacing: 0.22em; }
    }

    /* ===== LIGNE SÉPARATRICE ===== */
    .lc-divider {
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #b91c1c, transparent);
      margin: 10px 0 8px;
      animation: dividerExpand 0.6s ease 1.2s both;
    }

    @keyframes dividerExpand {
      from { width: 0; opacity: 0; }
      to   { width: 200px; opacity: 1; }
    }

    /* ===== COORDONNÉES ===== */
    .lc-contact {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .lc-contact-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.95rem;
      color: #1a1a1a;
      font-weight: 400;
      opacity: 0;
      animation: contactFadeUp 0.5s ease forwards;
    }
    .lc-contact-item:nth-child(1) { animation-delay: 1.4s; }
    .lc-contact-item:nth-child(2) { animation-delay: 1.6s; }

    .lc-contact-item .icon {
      width: 22px;
      height: 22px;
      background: #b91c1c;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .lc-contact-item .icon svg {
      width: 12px;
      height: 12px;
      fill: white;
    }

    @keyframes contactFadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== BOUCLE SUBTILE : légère respiration sur l'icône ===== */
    .lc-icon {
      animation: breathe 4s ease-in-out 2.5s infinite alternate;
    }
    /* On applique aussi l'entrée initiale avec transform-origin centré */
    @keyframes breathe {
      from { transform: scale(1) translateY(0); }
      to   { transform: scale(1.03) translateY(-2px); }
    }

    /* ===== SHIMMER sur le titre en boucle ===== */
    .lc-title .reno {
      position: relative;
      overflow: hidden;
    }
    .lc-title .reno::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      animation: shimmer 4s ease 3s infinite;
    }
    @keyframes shimmer {
      0%   { left: -100%; }
      40%  { left: 130%; }
      100% { left: 130%; }
    }

  </style>
</head>
<body>

<!-- =============================================

  <!-- NOM -->

  <!-- SÉPARATEUR -->
